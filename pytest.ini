
[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 6.0

# Add current directory to Python path
pythonpath = src

# Test paths
testpaths = test/pytest

# Output options
addopts =
    -ra
    -q
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-branch

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    fast: Fast running tests

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test/*
    */__pycache__/*
    src/__init__.py
    */src/__init__.py
    */__init__.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
omit =
    src/__init__.py
    */src/__init__.py
    */__init__.py
    */test/*
    */tests/*

[coverage:html]
directory = htmlcov